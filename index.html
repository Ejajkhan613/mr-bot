<!doctype html>
<html>
    <head>
        <title>Next-Gen Bot Ecosystem</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="animations.css">
    </head>

    <body>
        <div class="hint">
            WASD: Move | Space: Thruster Jump | B: Optical Reset | V: Acknowledge | H: Transmit | M: Cycle State | E: Recharge Core | Del: Decommission<br>
            Click/Drag units to reposition | Click grid to deselect
        </div>
        
        <div class="scene" id="scene">
            <!-- Units injected here via main.js -->
            <div id="workProgress" class="work-progress">
                <h2 id="projectName">Starship Construction</h2>
                <div id="projectStatus">Calibrating...</div>
                <div class="bar-bg"><div id="progressBar" class="bar-fill"></div></div>
                <div id="workerCount">Workers: 0</div>
            </div>
        </div>

        <div class="controls">
            <button class="add-btn" onclick="addBot()">Deploy Unit</button>
            <button class="delete-btn" onclick="deleteSelected()">Decommission</button>
            <button class="work-btn" onclick="startCollaborativeProject()">Build Together</button>
            <button onclick="performAction('jump')">Thrusters</button>
            <button onclick="performAction('blink')">Optics</button>
            <button onclick="performAction('wave')">Acknowledge</button>
            <button onclick="performAction('sayHi')">Transmit</button>
            <button onclick="performAction('toggleMood')">Cycle State</button>
            <button onclick="performAction('eat')">Recharge Core</button>
        </div>

        <script type="module" src="main.js"></script>
    </body>
</html>
